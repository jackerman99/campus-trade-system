spring:
  application:
    name: item-service
  profiles:
    active: local
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
  datasource:
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8082

app:
  jwt:
    secret: CampusTradeSystemJwtSecretKeyFor2026Project

ai:
  enabled: true
  chat-url: ${AI_CHAT_URL:}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:}
  timeout-seconds: 30